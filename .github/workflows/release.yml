name: Release

# Runs after Validate finishes on main. If manifest.json's version doesn't
# already have a matching tag, tags it and creates a GitHub Release with
# the matching CHANGELOG.md section as notes — no manual `git tag`/
# `gh release create` needed, just bump the version and push.
on:
  workflow_run:
    workflows: ["Validate"]
    types: [completed]
    branches: [main]

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r .version custom_components/binmaster/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already tagged
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract this version's CHANGELOG section
        if: steps.check.outputs.exists == 'false'
        run: |
          awk -v ver="${{ steps.version.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "See CHANGELOG.md for details." > release_notes.md
          fi

      - name: Tag and create the release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" "${{ github.event.workflow_run.head_sha }}" \
            -m "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release_notes.md
