name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 0" # weekly, catches drift from upstream hassfest/HACS changes
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration

  frontend-dist:
    name: Frontend dist up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Fail if the committed dist doesn't match a fresh build
        run: git diff --exit-code -- custom_components/binmaster/frontend/binmaster-card.js
